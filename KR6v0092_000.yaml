front:
  text: 佛性觀修善法整理者西本照真題解佛性觀修善法一卷中國佛教典籍三階教創始人信行撰本文獻是三階教的重要著作未為歷代經録所著録亦未為歷代大藏經所收關於佛性觀修善法的內容與研究可參見拙作佛性觀修善法的基礎研究載木村清孝博士還曆記念論集東亞佛教的形成與展開年春秋社現知在敦煌遺書中保存該文獻寫本兩件即中國國家圖書館藏敦煌遺書北敦號制縮微膠卷號與北敦號新北敦號首殘尾存尾題作觀修善法尾題的前兩字脫落北敦號從中部起抄寫佛性觀修善法這一文獻存有首題但文本尾殘將兩號相互對照北敦號所存為該文獻的前部分而北敦號所存為該文獻的後部分兩者約有字相互重復由此可以將兩個寫本合併而復原佛性觀修善法的全文復原後全文約有一萬餘字並可補足北敦號尾題所殘兩字恢復為佛性觀修善法前此業露華已將北敦號整理録文發表在藏外佛教文獻第四輯上所以在此僅將北敦號整理録文與北敦號重復的部分參校該號及業録文整理本底校本情況如下底本北號甲本北新號録文前殘末之秋生無教主之辰開無決疑之口是以戒見俱破喻如活剝生牛煩惱是非其瘡極大所以如來拱手諸佛不治大聖寂於涅槃菩薩分形異類所以久來流浪只為不遇佛性浮囊不慎羅剎索求名相墳河漂流生死是以十方諸佛不救故知是定死難渡之人今於釋迦遺法之中忽然還活如囚得命荷慶佛性耆婆無始迷狂賴值真如妙藥何期無明大夜忽遇明燈三毒林中乃生佛子貪瞋境裏悉有真如凡聖人中乃有法身之佛如來藏體與聖齊功果得菩提無生不備故大聖稱言如來藏佛若悟深而則淺佛是衆生以因收果復不悟淺而則深衆生是佛以果收因斯則冰中見水誰道此人而言妄語斯則依水求冰攢火木中無有人能譏嫌得失斯則貪瞋不起癡即不生三毒既無名為解脫既出貪瞋三界生老病死何足可傾境無憎愛可貪是則名為晏坐故維摩言不於三界見身口意是名晏坐智人斷惡修善道人己過數陳息道人不善不輕悔罪約法性而陳愆生死危亡觀藏體而除謝斯則修善盡聖凡之際斷惡理及因果真如名超聲聞之階行越三乘之位以體收相則是淨土之人以果收因是則名為正見佛道以相收體是邊地之人廢體從緣故名流轉生死昔三世諸佛因時修善悉入佛性道場凡欲陳愆則對真如懺謝晝則尊行恭敬夜則明燃心燈悶則行道遣眠乏則坐觀如來藏佛諦觀法性則無始罪業自亡目視真如則未來生死永息懺斯舊罪如秋葉辭林悔過善根復似春花發樹一時一念定勝千劫名相修禪一念一時過越恆沙文字持戒敬生中道是則得渡因緣貴聖敬凡是則名為淨身口意而修佛事學大丈夫之調御咄提婆之惡心潛盲觀而獨存入聖聚而菟伏非如來印而不語非見佛不出頭非得眼不人師非識根而不授藥次已後明體學相歸一倍顛倒引此兩人以為軌則策勵身心知相學是邪體歸是正用斯況並深生信怖所以昔三藏煞羅漢於說戒之夜由不得盲觀入心牛王目起嫌於蘭若比丘為不忍天鼓善星解行不救為不稱實而知有見由譏為不依佛慧斯等為別解別行而造集因分別是非自招苦果也是以多聞三藏有漏學之纏善星解行超群返造三塗惡業未知前人凡聖得教就義應然我既是生盲之人理須休彼一人具八大之善傳惡響於三塗空歎教內文字真如棄衆生佛性此持文字之戒不是非於人不了法性真如不受人謗毀故經云教內似得文外即無此之謂也不輕菩薩勤三業於衆生三藏之留棲勤學於經論教非邪錯取者有及有過文義相乖令勤學而無益以體收相故是有解丈夫廢體從緣故非君子攬矣所以智人則聖遇像凡詐智師賢求愚弟賢求愚弟則以體收緣凡詐智師即以相收體慧廣令智退所謂善星解多令心盲謂之三藏故經言寧当少聞多解義味千金買藥不愈微風賤價之醫能除滿病不輕敬闡提四衆故稱賤價之醫免生死而證涅槃今號釋迦之佛善星親事無上法王不免三塗空歸無益千金之藥即喻如來賤價之醫喻如四衆也牛王精勤求佛返受羅剎之身貧女無求倒生天上牛王著文字修道捨體應兩人雖誦三聚法輪而不能救隨遂諸見為名相而破眼根又不認盲謗於蘭若縱持法聚是無慚愧之人為此因緣而為羅剎故佛言雖復誦經禪口中刀劍出即牛王是也貧女者是破戒持見之人終日思愆常慚常愧見人過咎不敢譏論於己罪辜身心惶懼懷任一子寄産他方還國值河漂流而死為憐子故併命黃津不以生天共兒受死故佛言無求倒生天上是故汝今亦復如是守護見解及菩提心逢杖逢刀一所併命如彼貧如愛念其兒兒喻菩提之心女喻汝身事須努力他方喻於名相本國即喻真如黃河喻彼違緣併命喻斯受死斯等三人為解多慧廣返惑真如語閙辭繁失衆生佛性終歸悟理少解如聞不藉廣知軌在用之無失不輕體解傳美響於十方三藏文知傳臭名於今代若人起教擬策末世凡夫我若不順不行三業即同前鬪諍以斯況並故知無始常行打罵聖人據昔類今即是知不正學之人是以生盲之觀非法忍而常為應聖感機非眼開而須作法身之觀以體收相而安心菩薩大慈於愛憎而平等普親之觀況別生養而知恩不淨無常去愛慢而除捨拭塵巾觀則不輕而敬四生慚愧之衣非成佛而披著以聖攝凡悔過則惡名不到三塗以體收相而歸依則美名流於淨土舒則聖凡周流萬像卷則凡聖一味一如文有凡聖二名義無聖凡別體以因收果則無聖不從凡而來以果收因無凡不当成聖時差別故因果異名證有先後差殊則立聖凡二字王臣佐史皆是一人諸佛菩薩衆生終無異體所以身不證者只為迷故成凡會理有無解故所以稱之為聖此由人迷理擁凡聖則別立二名理顯人通義均則凡聖一揆何期一池之水妄立八字之名一味真如分居十一之位此由解心不等取境不同隨見解而牽生致如斯也是以諸佛觀生若己則謙下於漏徒菩薩觀己若生則恭卑於僕禮香塗刀斫會理無怨解節身技達迷能忍了衆生無相則相是如悟已無人則身無我過所以捨身屬彼棄我所而事之此性諸佛所師不可輕也故佛言一切衆生皆有佛性淨是故於彼勿生下劣想應当尊重彼即我師如法恭敬捻香燃火禮空裏之如來地上真如信凡心而謗罵空中無佛尚盡身命而歸依眼見佛性容聖返生輕害素紙竹帛猶合掌南無前境真如全無敬意因文敬義義則是衆生因義敬文文則是經卷因文敬義因義敬文文義相從豈非是理將刀斫影豈可關身只是識字讀經何關罪事若言文字是道不見廣解者不墮三塗復唱三藏解知不見無免煞聖人之罪斯等不敬衆生佛性唯學教內文字真如復輕聖內之凡又慢凡中之聖衆生佛性非今始傳諸佛應身昔非不有三藏講說豈不見斯信有而不行知有而不作是以見違情羅漢類凡夫而煞之由不認盲人乃逢斯事加復隨名隨相不體解衆生恣縱心神聖凡俱害也謂名文是道慢得定之人信口是非賤敬衆生之行故經云增上慢人此之謂也不專論誦捨教內文字真如口歎身恭敬衆生佛性当根稱理空悟偈言臨欲終時更增受命其罪滅已顯過消除三毒既亡六根清淨今当作佛號曰釋迦以果收因即不輕是也增上慢衆千劫阿鼻歷代經傳豈虛談也先師既爾弟子應然步涉師蹤則如舊跡以體收相故號不輕廢體從緣名為增上若愚學即不及若慧學即太過得及不過謂真學也是以不輕煞智慧之賊存福行而恭勤歎三性而讚言汝当作佛誦一十九字故曰少聞以體收相而妄心是名多解多聞三藏經說無知少解不輕今稱天人師佛隨文取義相執是非學與根差反增生死故佛言如返人得兵劫火遇風災此之謂也是以聖人常住以無明為宗六道死生以是非為本大丈夫辭怨親於平等別生死於自他防刃刀息於地唇斷是非於憎愛呵五陰淨六根咄瞋癡離於心腑遠諸見於無知積菩提於無我謂解脫之丈夫故曰出纏之大士又非破漏之才故曰全賢之像上來盲應佛性敢肆果毅之録所見愚情寄於尺紙且自悅心腑以慰愁懷迷悶之時暫將榮殆斯喻群盲摸像言似杵臼之箕唱色暉紅則有雪軻之異故知此性叵測惟大聖稽古得知法性深邃幽玄非凡情陳而窮曉其言寡碎不堪悟人信自愚情撰之成韻請明知解者願勿哂之有智賢等乞不嗤笑唯願改定去僞留真但某雖是蓬夫不諱簸揚之惡縱生貧賤志存松竹之心亦有見賢思齊之亦慕智人思愆又明如來藏觀明所行方法如來藏觀者於內有三一者明所觀境界二者明能觀之心三者明頓入一乘頓出生死第一所觀境界者於內有二一者明緣體義同二者明見之方法及不見所由緣體義者何故名緣緣者有其二種一者相二者行相緣者即佛衆生六道相殊塵沙差別未論體有故曰名緣所言行者即如佛約緣起行所行緣行或六弊一乘善惡邪正大小淺深苦空常樂如是諸行及以名相並約緣生故曰名緣體者即因佛性本覺真如能與法界作依持建立故言為體云何名為緣體義即者即真如佛性體起成緣緣即是體故言為即出生義同者諸佛菩薩聲聞緣覺一切聖人皆悉出於火宅之原離於生死之際故言為出義同者三世諸佛悉同有塵沙萬行一一行德皆盡虛空遍法界悉從真如性中流出不離真如有斯萬德故言名同同者凡聖不二即者緣體不殊但以體章名故言同即第二見之方法者即涅槃經說對非佛性說名佛性非佛性者即土木瓦磚離此無情之物悉名佛性又言衆生者即是佛性何以故若離衆生無處可得阿耨多羅三藐三菩提故復言未得成佛以還悉名佛性以此來驗故知真如佛性體起成緣緣即是體故言可見又如寶性論說依此妙法身出生於三寶即知三寶衆生皆從真如性中流出皆用真如以為根本真如佛性即是妙法身因此真如佛性約緣依持始有此三寶衆生故道依此妙法身出於三寶不出生者是即真如佛性是能生佛僧衆生是所生能生是體所生是相因真如佛性能生體始有佛僧衆生所生相既知真如佛性約緣能作三寶衆生故知三寶衆生即是佛性既是佛性理然可見亦如起信論文說依真如有生滅覺不覺真如者即是六道名相真如既是佛性性體之中合通一切萬法既合萬法即能約緣依持染淨真如既也依持染淨染淨即是塵沙差別差即六道六道即是名相名相即是生滅既知依於真如有斯生滅故知生滅即是真如既是真如何以故不見覺不覺者覺有三種一者本覺二者始覺三者了覺言本覺者即是真如佛性自性清淨本識之中覺性分明在纏未出故言本覺始覺者即是行也覺惡能斷覺善能修斷惡修善故名為覺初發心故名始覺又始覺者覺有二種一覺理二者覺量言理者正覺真如佛性於染淨二業力能雙持妄法所纏體不缺壞淨法滋勳亦不增異故體恆如不缺壞故性常定既曉真境照理不虧見性常恆故言覺理言覺量者於內有二一明覺能成因即苦空常樂是二明覺所成果即三身果德是所以因果雙照理量俱明昏暗初開故言始覺言了覺者即是行因感果四德俱圓諸惑皆妄三祇德滿於所行法曉達無窮照理明徹故言了覺言不覺者即是無明翳覆真如約緣起妄染諸倒惑迷情塵厚滯隱纏染睡識未明故言不覺不覺者即是無明本覺者即名自性住始覺者即是引出了覺者即名至德自性住即名本性引出者即名行性至德者即名果性始了二德即名佛僧體與無明即是衆生以此理推即知真如佛性約緣依持善惡二業善惡二業即名覺不覺若覺即名僧不覺即是衆生以是義故故知佛僧衆生即是佛性既是佛性故云可見又如涅槃經三十二卷過半後說五陰者即佛性故知色受想行及諸識等行住轉動所造施為悉名佛性故言可見復言六識者即是佛性以此文驗故知真如佛性體起成緣依持染淨舉體皆是故言可見又如勝鬘經說識及心法智不種衆苦涅槃因即是廢緣證體故德道非唯有如來藏法即是性體種衆苦即是惡陰及惡六識能厭苦樂求涅槃即是善陰識等及六度一乘三乘苦空常樂如是諸行俱名厭苦善性故言唯有如來藏法種衆苦及能厭苦樂求涅槃以此理推故知真如佛性體起成緣於染淨二業力能雙持濕潤生長六道果報凡聖二衆亦復如是既知前境佛僧衆生盡是佛性不離真如有斯名相不離名相別更真如即是名相即妄是真如正相真如俱因俱果所以真如佛性顯現分明約境對緣豈容藏隱由不隱故性相常恆以常恆故故言可見如涅槃經說是人雖信佛法僧寶不信三寶同一性相是名為信不具足又言三寶性相常恆亦同是例如勝鬘經復道生死者依如來藏故說生死本際不可知所以得知離生死外無別真如離真如外無別生死故知生死真如即是一體既同一體理然可見行者若悟斯理無妄不真暗識總融何邪不正性智一起相見摧亡無始纏迷一時解散引文證者如占察經下卷內說初發心凡夫學大乘者作一實諦觀復道善根微少凡夫恐真如難見息心不學地藏菩薩勸進學人稱名繼念得見法身即是真如真如即是一實諦觀以此推驗即知凡夫得見真如佛性如起信論文道凡夫得真如於後既見十種利益故知凡夫得見真如又涅槃中直心內說若見衆生有少善事即讚歎之以此文驗故知真如佛性體起成緣緣還即體故言可見不見所由者不知真如佛性體起成緣緣即體故所以不見又廢緣談體名為不見以果對因亦名不見又言不見者唯有成佛果性金剛後心非佛不了凡夫位分理然不見不見者對體以章名可見者約緣而立稱見與不見俱有道理不得於間辨相違也第二能觀之心者亦有二種一明入觀方法二明照性起行寬狹長短入觀方法者於內有二一明攝念方便二明善境界了了分明知入不入相攝念方便者須知若不攝念學諸觀行無由可成云何攝念初始學觀先須攝諸妄念令心停住故知妄念本來無實性實性淨心中本無虛妄動情既謝息妄歸真緣妄不生故云攝念妄情既滅唯有真心復須引此真心入於真境善入境界分明了了知入不入觀前境界唯是真如引此真心常令入觀觀智一起相境摧亡真心不返故言善住行立坐臥心境相隨剎那生滅故念不移所以名相不起妄相不生真心一發塵境不行恆定不亂故言了了分明一日一夜分為十分明時檢驗自心為當在觀為不在觀若心在即自知入若不在觀即知不入如是校量即自知已當已不當若心不在觀隨神妄境十分五分一不相應若逢違順還復貪嫌以此量之明知觀心不立心不立故故言不入若也不入即知是佛性外浪行人即自知是佛性不救衆生佛道如是之人雖存日夜並是偷地而行雖受飲食恆為盜食行住臥悉是非儀運手動足皆名是賊法若食信施一口飲食百生萬劫割切身實償其施主上來雖復文多不同但以文勢相連其不皆明入觀方法第二明照性起行寬狹長短者於中有二一者起心寬狹二者明引心令深起心寬狹者謂行者等但見前境一箇身真即見前際微塵數身悉是佛性何以故體無別故若見一箇身真即見真如佛性佛橫遍十方豎通凡聖以此理推即知性行兩心是寬非狹二明引心令深者諸行者等好自思量形像佛表真身作見即不敢生輕況復真如佛性塵沙功德體性滿足不少一分一毫云何於上生輕也引事比校如其淺深如似象王被他箭射由故見善乃至畢竟發心不改如來藏觀亦復如是被打被罵以死為期不退者始名為深初時雖復布心入觀後逢違順便復起心貪嫌明知觀心不立又與六相應者是名為深第三頓入一乘頓出生死者但見真如佛性境了了分明觀智一起倒識不行前後通用不假翻回塵沙萬境理體同一以同一故故言一乘性智一起更無後心迷惑不返故言頓入如占察經說地藏菩薩言若能作此真觀者速疾得入菩薩種性既入種性名頓入一乘初發心時便成正覺即能開解亦同是例出生死者三慧起心照達真緣望情頓謝諸惡摧亡倒識偏心永息不行即名頓出生死如勝鬘經說捨身命財盡生死後際等身但知真如佛性起心照境身命不惜所為所作悉是出生死業所觀之境唯見真如能學之心三業俱盡境真如故即名頓入一乘俱盡故復名頓出生死上來所制未敢指南若有智者願知定之又明法身觀第一法身觀略有二種第一就體以明法身第二法身觀者約緣以明法身體法身者即是真如佛性體湛然自性清淨非緣修作在因不少至果不多在染不減處淨不增本識淨心從本已來體無有二無去無來非生非滅動散常恆不增本識淨變圓滿十方究竟一相自性清淨本來性爾諸惑容塵所不能染塵沙清淨自性湛然性體常恆非緣情異恆沙諸德自體滿足故名體法第二約緣辨法身復有二種一凡一聖一法身者即真如佛性約緣住轉恆沙品類方得成立行因報緣無自體依正真如既法身以體收緣故以體起是緣緣即是體何名為法身者體變是妄何故佛性是真非妄佛者是因果俱真性則是因果俱談故名佛性舉因談果果非妄以因果俱真故因真故果真不見真因生妄果以體攝於緣凡聖同一相體外見相緣各殊本外見未體不相體相即約緣因果即緣而受稱就就事而立名因果別論出體如寶性論云一切衆生界不離諸佛智以彼淨無垢性體不二故依一切諸佛平等性法身知一切衆生皆有如來藏以此文驗故知法界衆生即是法身佛何以故因果雖殊體無別故真如佛性既是法身能成體用用起成緣所行緣相生滅不生滅覺了諸行等悉是法身所成用以體收緣莫問名之與相解與行等法界參羅俱名一法諸行者等若悟此理見一真如身即見法身橫遍十方豎通三世但見現在身真即見前際微塵數劫一一劫中微塵數身悉是法身雖可約緣流轉不住法身之體離生滅故但見現在身真即見後際佛地以還悉是法體所以故自性法身約業持業流轉不住倒於後際所以得知六根聚經第二卷說明真如佛性法身為煩惱薰染隨緣起妄經文道但從無始世來與無明心俱癡暗因緣薰習力故現妄境界以依妄境界薰習緣故起於妄想應心計我我所造集諸業受生死苦說彼法身名為衆生若是衆生中法身薰習而有力者煩惱漸薄能厭世間求涅槃道信歸一實修六波羅蜜等一切菩提分法名為菩薩乃至修行一切滿足究竟得離無明睡者轉名為佛當知如是衆生菩薩佛等但依世間假名言說故有差殊而法身之體畢竟平等無有異相如此文驗故知前際塵沙品類悉是法身報身者一一身上行因感果故名報身又法報兩身同異義者同則緣體不二異則各有差殊不異者報身即是法身何以故體起成緣緣即是體本來無別未有體外無明別即起信論云始覺之義還同本覺故知報即法法即報報者即本識淨心約緣依持染淨等業故知性非獨立本緣成報即起信論云以有本覺說名始覺亦如勝鬘經說以有如來藏故說生死本際不可知亦同是例以有自性法身乃至成三身亦同一種以此來驗故知外無別緣體即緣法外無別報法即報報即法非一以成法即非二以成二報即法非一故緣體恆不同非二故法無兩別不同得立法報名不異故復得成一義第二就體以明報應報應法身者過去諸佛行因尅果名之為報體寂然名之為法對生就用名之為應即此應身名為報身何以故體無別故即知應身即報身故故知諸佛為度衆生於一念中分身百億橫遍法界豎通凡聖作一切身盡何以故得知如寶雲經說如來九種無窮無盡功德一一功德皆道盡虛空遍法界故知法身遍周法界二如涅槃經說諸佛度衆生隨類化之衆生之類有形無形天地虛空悉皆充滿明知諸佛法身遍滿虛空盡衆生界一佛既爾一切同名異名皆亦如是經文道佛身者即法身是也故知諸佛法身無量無邊不可窮盡報身者佛於過去三大阿僧祇行法界因今還感得法界果訓先所求故名為報諸行者等好自思量從無始已來恆在一切諸佛境界不覺不知心不知故於爾許諸佛法身所於佛身上佛心中佛眼裏具造一切十惡五逆誹謗毀呰呵責打罵剝皮割肉飲血噉髓一一惡法悉皆具造由如虛空大地等至於今日未曾一悟次論生死沒煩惱河如斯惡業熾然更造不休不息思尋是已切痛悲傷更造諸惡不可具說諸行者等好須作意此当來世甚当可畏自今以去既得悟斯真境斯等諸惡即須頓息三慧照裏稱境修行纍劫三祇於斯頓廢身口意業與死為期不證菩提終無退轉希同雪山之士誓願等彼論勤修過四句始是報佛慈恩又明法身同異義若將果望體談應報俱名法若將短因就長因法應俱名報若以長因就短因法報俱名應同則三身體何以故體無別故異則各有差殊何以故對生就用因果不同故體一故應報法中生各別故因果緣中出因緣出果故法界得成應成不二故法身義復立同者就體以章名異者對座而受稱故名為異又明三種法身同異義性法身就體明緣法身約報論果法身出緣說明體故因果非約緣法報即論果故出凡識體一故調然別法報即同而異體真非始了法報果非因因果體全別是故名為異同者體真即緣果何以故即起信論文云道以有本覺覺圓時轉名為佛緣報即是二德何以故還彼論文道始覺之義還同本覺及了覺故果法即體何以故即寶性論文說真如性體遍通三處乃至究竟三時不變亦同是例緣行融之有異果體則因果雙持稱理而談則原來不異故名為同亦如六根聚經說平等法身義經文道真如佛性自性清淨約體不少入緣不多不少故衆生體不異法身體故故說衆生即法身不多故果異體不異於同體故故說法身即衆生復道如是衆生菩提佛等但依世間假名言說故有差殊而法身之體畢竟平等以此文驗故知佛僧衆生體相因果俱同一體故因法身諸佛法身遍三界如聖眼滿虛空恆在佛心佛眼裏衆生造罪幾千里又明心寂觀其體寂者即真如佛性自性清淨體無塵穢本來虛寂雖居惑不以惑能惑雖處淨緣不假淨而能淨所以真如佛性體性如如自性寂然常恆不變雖復至於三處其體湛然在凡聖四六之中性無增減在淨則名離垢處穢則名性淨性淨故染非能染離垢處穢則名性淨性淨故染非染離垢故穢非無非無能穢染非染故性常恆穢非穢故體恆淨體恆淨故知在衆生不少至諸佛不多但以體收六趣四生即恆不變故理無塵以塵無故故言體寂所以知之不染浪緣性體之中空無妄業性非染業故曰無塵舉理妄緣故云體寂其心寂者則內興三慧外達真緣照理除迷真興妄謝觀智一起妄相摧亡倒識不行故言心寂體寂者即是其可心寂者即是其能由體寂故則外有真緣由心寂故則內興正智外淨故塵境摧亡內靜故妄心謝滅妄心謝故故言心寂塵境滅故故言體寂體寂者無屬惠也心寂者即無屬定也録文完
